<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <link href="./Styles/styles.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./stylesComponents/aboutUs.css">
</head>
<body style="background-color: #1b4332">
    <div id="navbar-container"></div>
    <h1 class="italianno-regular" style="text-align: center; margin-top: 20px;">
        CONTACTANOS
    </h1>
    <br>
    <form class="roboto-class" style="margin-bottom: 50px;">
        <div id="alertaSitio" class="container"</div>
        <div class="mb-3">
            <label for="nombreInput" class="roboto-class">Nombre: </label>
            <input type="text" class="form-control" id="nombreInput" aria-describedby="Nombre">
        </div>
        <div class="mb-3">
            <label for="emailInput" class="roboto-class">Correo electronico: </label>
            <input type="email" class="form-control" id="emailInput" aria-describedby="Correo">
        </div>
        <div class="mb-3">
            <label for="telInput" class="roboto-class">Telefono: </label>
            <input type="tel" class="form-control" id="telInput" aria-describedby="Telefono">
        </div>
        <div class="mb-3">
            <label for="mensajeInput" class="roboto-class">Comentarios/Sugerencia/Quejas</label>
            <textarea class="form-control" aria-label="text-area" id="mensajeInput"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="background-color: #43aa8b; color: white;" id="formButton">Enviar</button>
    </form>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        emailjs.init({
            publicKey: "i2BE_B8pF-wlfhbkZ"
        });
    </script>

    <script src="./js/functions.js"></script>
    <script src="./js/components/footerComponent.js" ></script>
    <script src="./js/components/navbarComponent.js"></script>
</body>
</html>
